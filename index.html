<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le.Safaiya - 公式ショップ</title>
    <style>
        /* --- 基本デザイン --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; font-family: 'Helvetica Neue', 'Arial', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .space { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(30, 0, 80, 0.4), transparent 50%), radial-gradient(circle at 80% 70%, rgba(0, 40, 100, 0.4), transparent 50%); z-index: 0; }
        .stars-back { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; box-shadow: 50px 100px white, 200px 300px white, 350px 50px white, 500px 400px white, 650px 150px white, 800px 500px white, 950px 250px white; opacity: 0.3; }
        section { position: relative; width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #hero h1 { font-size: 4em; letter-spacing: 0.5em; background: linear-gradient(to right, #fff, #88e3ff, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(136, 227, 255, 0.8)); margin-bottom: 25px; }
        .top-discord-link { font-size: 1.1em; color: rgba(255,255,255,0.7); text-decoration: none; border: 1px solid rgba(255,255,255,0.2); padding: 12px 25px; border-radius: 30px; transition: 0.3s; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); }
        
        /* --- 横長カード --- */
        #product-list-section { display: flex; flex-direction: column; gap: 20px; padding: 100px 20px; max-width: 900px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; width: 100%; display: flex; align-items: center; padding: 25px 40px; transition: 0.4s; box-sizing: border-box; }
        .card:hover { transform: scale(1.02); border-color: #88e3ff; background: rgba(255, 255, 255, 0.07); }
        .img-box { width: 70px; height: 70px; min-width: 70px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.5em; margin-right: 30px; }
        .card-info { flex-grow: 1; text-align: left; }
        .card-info h3 { margin: 0; font-size: 1.8em; }
        .stock-tag { font-size: 0.8em; color: #88e3ff; opacity: 0.7; display: block; margin-top: 5px; }
        .card-action { display: flex; align-items: center; gap: 40px; }
        .card-action p { margin: 0; font-size: 1.6em; font-weight: bold; }

        /* --- ボタン --- */
        button { background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1em; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: translateY(-3px); }
        .btn-paypay { background: #ff0033 !important; }

        /* --- 画面切り替え --- */
        .overlay-screen { display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(40px); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; align-items: center; justify-content: center; }
        .container-box { display: flex; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; width: 90%; max-width: 1000px; min-height: 500px; overflow: hidden; }
        .pane-left { flex: 1.2; padding: 50px; border-right: 1px solid rgba(255, 255, 255, 0.1); }
        .pane-right { flex: 1; padding: 50px; background: rgba(0, 0, 0, 0.2); display: flex; flex-direction: column; justify-content: center; }
        
        .back-link { margin-top: 20px; color: #aaa; cursor: pointer; text-align: center; font-size: 0.9em; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="space"><div class="stars-back"></div></div>
    
    <div id="main-page">
        <section id="hero">
            <h1 id="top-logo"></h1>
            <div id="top-discord-container"></div>
            <div style="cursor:pointer; margin-top: 50px; opacity: 0.5;" onclick="window.scrollTo(0, window.innerHeight)">下にスクロール</div>
        </section>
        <section id="product-list-section"></section>
    </div>

    <div id="detail-section" class="overlay-screen">
        <div class="container-box">
            <div class="pane-left">
                <h2 id="detail-name" style="font-size: 2.5em; margin: 0;"></h2>
                <div id="detail-price" style="font-size: 2em; color: #88e3ff; font-weight: bold; margin: 10px 0;"></div>
                <div id="detail-stock" style="color: #88e3ff; font-size: 0.9em; margin-bottom: 20px;"></div>
                <div id="detail-desc" style="white-space: pre-wrap; line-height: 1.8; opacity: 0.8; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;"></div>
            </div>
            <div class="pane-right">
                <div style="background: #ff0033; color: white; padding: 10px; border-radius: 10px; font-weight: bold; text-align: center; margin-bottom: 20px;">🅿️ PayPay決済</div>
                <p style="font-size: 0.9em; opacity: 0.8; margin-bottom: 30px;">「購入手続きへ」を押すと、お支払い案内画面に移動します。</p>
                <button onclick="showThanks()">購入手続きへ</button>
                <div class="back-link" onclick="closeAll()">商品一覧に戻る</div>
            </div>
        </div>
    </div>

    <div id="thanks-screen" class="overlay-screen">
        <div class="container-box" style="flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 50px;">
            <h2 id="thanks-title" style="font-size: 2.5em; color: #88e3ff; margin-bottom: 20px;"></h2>
            <p id="thanks-message" style="max-width: 700px; line-height: 2; margin-bottom: 40px; font-size: 1.1em;"></p>
            <div style="display: flex; gap: 20px; width: 100%; max-width: 600px;">
                <button id="btn-paypay-link" class="btn-paypay" style="flex: 1;" onclick="window.open(config.payment.link, '_blank')"></button>
                <button id="btn-discord-report" style="flex: 1;" onclick="window.open(config.purchase.discordLink, '_blank')"></button>
            </div>
            <div class="back-link" onclick="closeAll()" style="margin-top: 40px;">ショップに戻る</div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        window.onload = () => { if (typeof config !== 'undefined') initApp(); };

        function initApp() {
            document.getElementById('top-logo').innerText = config.top.logoName;
            document.getElementById('top-discord-container').innerHTML = `<a href="${config.top.discordLink}" target="_blank" class="top-discord-link"><span>💬</span> ${config.top.discordButtonText}</a>`;
            const list = document.getElementById('product-list-section');
            config.products.forEach(p => {
                list.innerHTML += `
                <div class="card">
                    <div class="img-box" style="background:${p.color}">${p.name[0]}</div>
                    <div class="card-info">
                        <h3>${p.name}</h3>
                        <span class="stock-tag">現在庫: ${p.stock}</span>
                    </div>
                    <div class="card-action">
                        <p>¥${p.price}</p>
                        <button onclick="openDetail(${p.id})">詳細を見る</button>
                    </div>
                </div>`;
            });
        }

        function openDetail(id) {
            const p = config.products.find(x => x.id === id);
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-price').innerText = "¥" + p.price;
            document.getElementById('detail-stock').innerText = "在庫状況: " + p.stock;
            document.getElementById('detail-desc').innerText = p.desc;
            document.getElementById('detail-section').style.display = 'flex';
            document.getElementById('main-page').style.display = 'none';
        }

        function showThanks() {
            document.getElementById('thanks-title').innerText = config.purchase.title;
            document.getElementById('thanks-message').innerText = config.purchase.message;
            document.getElementById('btn-paypay-link').innerText = config.purchase.payButtonText;
            document.getElementById('btn-discord-report').innerText = config.purchase.discordButtonText;
            
            document.getElementById('detail-section').style.display = 'none';
            document.getElementById('thanks-screen').style.display = 'flex';
        }

        function closeAll() {
            document.querySelectorAll('.overlay-screen').forEach(el => el.style.display = 'none');
            document.getElementById('main-page').style.display = 'block';
        }
    </script>
</body>
</html>
