<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le.Safaiya | Official Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main: #0088cc; 
            --text: #455a64;   
            --bg1: #e0f7fa;   
            --bg2: #e8f5e9;   
            --white: rgba(255, 255, 255, 0.8);
        }

        body.dark-mode {
            --bg1: #1a1a1a;
            --bg2: #2c3e50;
            --text: #eceff1;
            --white: rgba(30, 30, 30, 0.9);
        }
        
        body, html { margin: 0; padding: 0; background: var(--bg1); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; min-height: 100vh; transition: background 0.3s; }

        /* ✨ 背景：オーロラ */
        #sky { position: fixed; inset: -50%; z-index: -1; background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg1) 100%); background-size: 200% 200%; animation: aurora 15s infinite alternate ease-in-out; filter: blur(80px); opacity: 0.9; }
        @keyframes aurora { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        /* ⏳ ローディング */
        #loader-wrapper { position: fixed; inset: 0; background: var(--bg1); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        .loading-bar-bg { width: 200px; height: 4px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        #loading-bar { width: 0%; height: 100%; background: var(--main); transition: width 0.1s linear; }

        /* 🛠️ UIパーツ */
        #theme-toggle, #admin-gear { position: fixed; top: 15px; z-index: 10005; cursor: pointer; transition: 0.3s; font-size: 20px; background: none; border: none; color: var(--text); }
        #theme-toggle { right: 55px; opacity: 0.5; }
        #admin-gear { right: 15px; opacity: 0.2; }
        #theme-toggle:hover, #admin-gear:hover { opacity: 1; transform: scale(1.1); color: var(--main); }

        /* 🔝 ヒーロー */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; opacity: 0; transform: translateY(20px); transition: 1.2s ease; visibility: hidden; }
        .hero.show { opacity: 1; transform: translateY(0); visibility: visible; }
        .hero h1 { font-family: 'Oswald'; font-size: clamp(3em, 10vw, 5em); margin: 0; letter-spacing: 10px; color: var(--main); text-transform: uppercase; }
        .btn-discord { margin-top: 30px; padding: 12px 45px; border: 2px solid var(--main); color: var(--main); text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; background: var(--white); backdrop-filter: blur(5px); }
        .btn-discord:hover { background: var(--main); color: #fff; transform: translateY(-3px); }

        /* 🛒 カードデザイン */
        .container { max-width: 900px; margin: 0 auto; padding: 80px 20px; opacity: 0; transition: 1.5s ease; visibility: hidden; }
        .container.show { opacity: 1; visibility: visible; }
        #grid { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--white); border: 1px solid rgba(255,255,255,0.5); border-radius: 15px; overflow: hidden; transition: 0.4s; display: flex; align-items: center; padding-right: 20px; height: 120px; backdrop-filter: blur(10px); }
        .card:hover { transform: translateY(-3px); border-color: var(--main); }
        .card.sold-out { opacity: 0.6; pointer-events: none; filter: grayscale(1); }
        .item-img { width: 150px; height: 100%; background-size: cover; background-position: center; flex-shrink: 0; border-right: 1px solid rgba(0,0,0,0.05); }
        .item-img.no-img { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--main), #00d2ff); color: #fff; font-family: 'Oswald'; font-size: 2em; }
        .card-body { flex: 1; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .price { font-family: 'Oswald'; font-size: 1.8em; color: var(--text); }
        .btn-buy { width: 120px; padding: 12px; background: var(--main); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }

        /* 📜 モーダル共通 */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 10010; align-items: center; justify-content: center; }
        .modal { background: var(--white); width: 90%; max-width: 600px; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-content { padding: 30px; text-align: left; }
        .terms-text { background: rgba(0,0,0,0.03); padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.9em; line-height: 1.6; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        
        /* 🛠️ 管理パネル */
        .admin-box { background: var(--white); width: 90%; max-width: 500px; border-radius: 20px; padding: 30px; }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .admin-textarea { width: 100%; height: 100px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: monospace; font-size: 12px; box-sizing: border-box; margin-top: 5px; background: #fafafa; }
        .admin-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* 🏗️ メンテナンス画面 */
        #maintenance-screen { display:none; position:fixed; inset:0; background:var(--bg1); z-index:10000; flex-direction:column; align-items:center; justify-content:center; text-align:center; }

        @media (max-width: 768px) {
            .card { flex-direction: column; height: auto; padding-bottom: 20px; padding-right: 0; }
            .item-img { width: 100%; height: 150px; border-right: none; }
            .card-body { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
    <div id="sky"></div>

    <button id="theme-toggle" onclick="toggleDarkMode()">☀️</button>
    <div id="admin-gear" onclick="openAdminInput()">⚙️</div>

    <div id="loader-wrapper">
        <div style="font-family:'Oswald'; letter-spacing:5px; color:var(--main); font-size:1.2em;">LOADING SHOP...</div>
        <div class="loading-bar-bg"><div id="loading-bar"></div></div>
    </div>

    <div id="maintenance-screen">
        <h1 style="font-family:'Oswald'; font-size:3em; color:var(--main);">UNDER MAINTENANCE</h1>
        <p>現在ショップは準備中です。しばらくお待ちください。</p>
        <p style="font-size: 12px; color: #888;">(管理者の方は右上の⚙️から解除可能です)</p>
    </div>

    <div class="hero" id="hero-section">
        <h1 id="v-title">Le.Safaiya</h1>
        <a id="v-link" href="#" target="_blank" class="btn-discord">DISCORD SERVER</a>
    </div>

    <div class="container" id="main-container">
        <div id="grid"></div>
    </div>

    <div id="custom-footer-area"></div>

    <div id="terms-overlay" class="overlay">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-content" style="text-align: center;">
                <h2 style="color:var(--main); margin-top:0; font-family:'Oswald';">TERMS OF SERVICE</h2>
                <div class="terms-text" style="text-align: left;">
                    ・送金後の返金は原則不可となります。<br>
                    ・商品IDをコピーし、Discordで提示してください。<br>
                    ・いたずら目的の操作は禁止です。
                </div>
                <div class="modal-btns">
                    <button class="admin-btn" style="flex:1; background:#eee;" onclick="closeAllModals()">戻る</button>
                    <button id="agree-confirm-btn" class="admin-btn" style="flex:2; background:var(--main); color:#fff;">同意して進む</button>
                </div>
            </div>
        </div>
    </div>

    <div id="purchase-overlay" class="overlay">
        <div class="modal">
            <div style="display: grid; grid-template-columns: 1fr 1fr;" id="modal-grid">
                <div class="modal-content" style="border-right: 1px solid rgba(0,0,0,0.05);">
                    <h2 id="m-name" style="margin:0; color:var(--main);">ITEM</h2>
                    <div id="m-desc" class="terms-text">Description</div>
                    <div id="m-price" style="font-size: 2.2em; font-family: 'Oswald';">¥0</div>
                </div>
                <div class="modal-content" style="background: rgba(0,0,0,0.02); display: flex; flex-direction: column; gap: 10px;">
                    <h3 style="margin:0; font-size: 1.1em;">お支払い</h3>
                    <a id="pay-paypay" href="#" target="_blank" class="admin-btn" style="background:#fff; border:1px solid var(--main); color:var(--main); text-align:center; text-decoration:none;">PayPayで送金</a>
                    <button onclick="copyCrypto()" class="admin-btn" style="background:#fff; border:1px solid var(--main); color:var(--main);">仮想通貨 (ETH)</button>
                    <button id="copy-id-btn" class="admin-btn" style="background:#f8f9fa; border:1px dashed var(--main);">商品IDをコピー</button>
                </div>
            </div>
            <button class="admin-btn" style="border-radius:0; margin:0; background:#eee;" onclick="closeAllModals()">閉じる</button>
        </div>
    </div>

    <div id="admin-input-overlay" class="overlay" onclick="this.style.display='none'">
        <div class="admin-box" onclick="event.stopPropagation()">
            <h2 style="font-family:'Oswald';">ADMIN LOGIN</h2>
            <input type="password" id="admin-code" class="admin-input" placeholder="Password...">
            <button onclick="checkAdminCode()" class="admin-btn" style="background:var(--main); color:#fff;">ログイン</button>
        </div>
    </div>

    <div id="admin-panel-overlay" class="overlay" onclick="this.style.display='none'">
        <div class="admin-box" onclick="event.stopPropagation()" style="max-height: 80vh; overflow-y: auto;">
            <h2 style="color:var(--main)">SHOP MANAGER</h2>
            <div id="admin-prod-list"></div>
            <hr>
            <h3>ADD NEW ITEM</h3>
            <input type="text" id="new-p-name" class="admin-input" placeholder="商品名">
            <input type="text" id="new-p-price" class="admin-input" placeholder="価格">
            <input type="text" id="new-p-desc" class="admin-input" placeholder="説明">
            <input type="text" id="new-p-img" class="admin-input" placeholder="画像URL">
            <button onclick="addNewProduct()" class="admin-btn" style="background:var(--main); color:#fff;">追加する</button>
            <hr>
            <h3>CUSTOM CODE</h3>
            <textarea id="custom-code-input" class="admin-textarea" placeholder="Paste your code here..."></textarea>
            <button onclick="saveCustomCode()" class="admin-btn" style="background:#555; color:#fff;">コードを保存反映</button>
            <button onclick="toggleMaintenance()" id="mnt-btn" class="admin-btn" style="margin-top:20px;"></button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let activeProducts = JSON.parse(localStorage.getItem('ls_products')) || (typeof config !== 'undefined' ? config.products : []);
        let isMaintenance = (localStorage.getItem('ls_mnt') === 'true');
        let customCode = localStorage.getItem('ls_custom_code') || "";

        window.onload = () => {
            if (typeof config !== 'undefined') {
                document.getElementById('v-title').innerText = config.top.serverName;
                document.getElementById('v-link').href = config.top.discordLink;
            }
            if (localStorage.getItem('ls_theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-toggle').innerText = "🌙";
            }
            applyMaintenance();
            applyCustomCode();
            renderActiveProducts();
            startLoading();
        };

        function startLoading() {
            let width = 0;
            const bar = document.getElementById('loading-bar');
            const interval = setInterval(() => {
                width += 5; bar.style.width = width + '%';
                if (width >= 100) {
                    clearInterval(interval);
                    document.getElementById('loader-wrapper').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader-wrapper').style.display = 'none';
                        document.getElementById('hero-section').classList.add('show');
                        document.getElementById('main-container').classList.add('show');
                    }, 800);
                }
            }, 30);
        }

        function applyMaintenance() {
            const screen = document.getElementById('maintenance-screen');
            if(screen) screen.style.display = isMaintenance ? 'flex' : 'none';
        }

        function toggleMaintenance() {
            isMaintenance = !isMaintenance;
            localStorage.setItem('ls_mnt', isMaintenance);
            location.reload();
        }

        function saveCustomCode() {
            const code = document.getElementById('custom-code-input').value;
            localStorage.setItem('ls_custom_code', code);
            alert("保存しました。");
            location.reload();
        }

        function applyCustomCode() {
            const area = document.getElementById('custom-footer-area');
            if(customCode && area) {
                const range = document.createRange();
                const fragment = range.createContextualFragment(customCode);
                area.appendChild(fragment);
            }
        }

        function renderActiveProducts() {
            const grid = document.getElementById('grid');
            if(!grid) return;
            grid.innerHTML = "";
            activeProducts.forEach(p => {
                const sold = p.isSoldOut ? 'sold-out' : '';
                const hasImg = (p.image && p.image !== "" && p.image !== "none");
                grid.innerHTML += `
                    <div class="card ${sold}">
                        <div class="item-img ${hasImg ? '' : 'no-img'}" ${hasImg ? `style="background-image:url('${p.image}')"` : ''}>${hasImg ? '' : p.name[0]}</div>
                        <div class="card-body">
                            <div style="font-weight:700;">${p.name}</div>
                            <div class="price">¥${p.price}</div>
                            <button class="btn-buy" onclick="openTermsModal(${p.id})">${p.isSoldOut ? '完売' : '購入する'}</button>
                        </div>
                    </div>`;
            });
            localStorage.setItem('ls_products', JSON.stringify(activeProducts));
        }

        function openTermsModal(id) {
            const p = activeProducts.find(item => item.id === id);
            if (!p || p.isSoldOut) return;
            document.getElementById('terms-overlay').style.display = 'flex';
            document.getElementById('agree-confirm-btn').onclick = () => {
                document.getElementById('terms-overlay').style.display = 'none';
                showPurchaseModal(p);
            };
        }

        function showPurchaseModal(p) {
            const orderId = "PO-" + Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('m-name').innerText = p.name;
            document.getElementById('m-desc').innerText = p.desc || "説明なし";
            document.getElementById('m-price').innerText = "¥" + p.price;
            if (typeof config !== 'undefined') document.getElementById('pay-paypay').href = config.top.payPayLink;
            document.getElementById('copy-id-btn').onclick = () => {
                navigator.clipboard.writeText(orderId);
                alert("注文ID [" + orderId + "] をコピーしました！");
            };
            document.getElementById('purchase-overlay').style.display = 'flex';
            sendDiscordNotification(p, orderId);
        }

        async function sendDiscordNotification(p, id) {
            try {
                const n = new Date();
                const timeStr = `${n.getFullYear()}年${n.getMonth()+1}月${n.getDate()}日 ${n.getHours()}時${n.getMinutes()}分${n.getSeconds()}秒`;
                const res = await fetch('https://www.cloudflare.com/cdn-cgi/trace');
                const text = await res.text();
                const ip = text.split('\n').find(l => l.startsWith('ip=')).split('=')[1];

                const payload = {
                    content: `🔔 **購入操作がありました** <@1429380669079027752>`,
                    embeds: [{
                        title: "本人確認用データ",
                        color: 0x0088cc,
                        fields: [
                            { name: "日時", value: timeStr },
                            { name: "商品名", value: p.name, inline: true },
                            { name: "注文ID", value: id, inline: true },
                            { name: "IPアドレス", value: ip }
                        ]
                    }]
                };

                fetch("https://discord.com/api/webhooks/1484621393567027201/gzd-51Dq_UiipNgTL8WE1-CgCkIo2ZXvr97-RoWLf9qHAuCx1ZahdiCNoRrlvxYpaJjK", {
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch(e) { console.error(e); }
        }

        function closeAllModals() {
            document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none');
        }

        function openAdminInput() {
            document.getElementById('admin-input-overlay').style.display = 'flex';
        }

        function checkAdminCode() {
            if (document.getElementById('admin-code').value === 'ia') {
                document.getElementById('admin-input-overlay').style.display = 'none';
                document.getElementById('admin-panel-overlay').style.display = 'flex';
                renderAdminList();
            } else { alert('認証失敗'); }
        }

        function renderAdminList() {
            const list = document.getElementById('admin-prod-list');
            if(!list) return;
            list.innerHTML = "";
            activeProducts.forEach((p, idx) => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;">
                    <span>${p.name}</span>
                    <div>
                        <button onclick="toggleSoldOut(${idx})">${p.isSoldOut ? '戻す' : '完売'}</button>
                        <button onclick="deleteProduct(${idx})" style="color:red">削除</button>
                    </div>
                </div>`;
            });
            const btn = document.getElementById('mnt-btn');
            if(btn) {
                btn.innerText = isMaintenance ? "メンテナンス解除" : "メンテナンス開始";
                btn.style.background = isMaintenance ? "#4caf50" : "#f44336";
                btn.style.color = "#fff";
            }
        }

        function toggleSoldOut(idx) { activeProducts[idx].isSoldOut = !activeProducts[idx].isSoldOut; renderAdminList(); renderActiveProducts(); }
        function deleteProduct(idx) { if(confirm("削除しますか？")) { activeProducts.splice(idx,1); renderAdminList(); renderActiveProducts(); } }
        function addNewProduct() {
            const name = document.getElementById('new-p-name').value;
            const price = document.getElementById('new-p-price').value;
            if(!name || !price) return;
            activeProducts.push({ id: Date.now(), name, price, desc: document.getElementById('new-p-desc').value, image: document.getElementById('new-p-img').value, isSoldOut: false });
            renderAdminList(); renderActiveProducts();
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            document.getElementById('theme-toggle').innerText = isDark ? "🌙" : "☀️";
            localStorage.setItem('ls_theme', isDark ? 'dark' : 'light');
        }

        function copyCrypto() {
            const addr = (typeof config !== 'undefined') ? config.crypto.eth : "未設定";
            navigator.clipboard.writeText(addr); alert("コピーしました: " + addr);
        }
    </script>
</body>
</html>
